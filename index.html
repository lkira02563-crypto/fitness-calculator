<!DOCTYPE html>
<html lang="en">
<head>
 
   <script src="script.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Fitness Calculator</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  height: 100%;
  font-family: Arial, sans-serif;
  background-color: #f0f4f8;
  color: #333;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: #ffffff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  border-radius: 15px;
}
.title {
  font-size: 30px;
  text-align: center;
  margin-bottom: 30px;
  color: #1e3a8a;
}
form {
  width: 100%;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 30px;
}
th, td {
  border: 1px solid black;
  padding: 10px;
  text-align: center;
  vertical-align: middle;
  background-color: #d0f0c0;
  min-width: 70px;
}
label {
  display: inline-block;
  font-weight: bold;
  margin-bottom: 8px;
  color: darkblue;
  font-size: 16px;
  cursor: pointer;
}
.gender-section, .activity-section, .buttons-section {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.radio-group {
  display: flex;
  gap: 20px;
  margin-top: 5px;
}
.buttona {
  background-color: rgb(205, 4, 4);
  color: white;
  border: none;
  padding: 10px 60px;
  border-radius: 2px;
  cursor: pointer;
  margin: 0 8px;
  transition: opacity 0.15s;
}
.buttona:hover { opacity: 0.8; }
.buttona:active { opacity: 0.5; }
.report {
  background-color: white;
  border: 1px solid rgba(37, 79, 206, 0.776);
  color: rgba(37, 79, 206, 0.776);
  border-radius: 2px;
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s;
  padding: 9px 60px;
  margin-top: 20px;
}
.report:hover {
  background-color: rgba(37, 79, 206, 0.776);
  color: white;
}
.report:active { opacity: 0.7; }
@media (max-width: 768px) {
  .container { padding: 20px; }
  th, td { font-size: 14px; }
  .buttona, .report { padding: 10px 30px; }
  .radio-group { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>
  <div id="results" style="margin-top:20px; text-align:center;"></div>
<div class="container">
  <p class="title">Welcome to Online Fitness Calculator</p>
  <form id="fitnessForm">
    <table>
      <tr>
        <th>Info</th>
        <th>Standard Units</th>
      </tr>
      <tr>
        <td><label for="age">Age</label></td>
        <td><input type="number" id="age" placeholder="Age"></td>
      </tr>
      <tr>
        <td><label for="height">Height</label></td>
        <td><input type="number" id="height" placeholder="Height in cm"></td>
      </tr>
      <tr>
        <td><label for="weight">Weight</label></td>
        <td><input type="number" id="weight" placeholder="Weight in kg"></td>
      </tr>
    </table>

    <div class="gender-section">
      <p class="gender">Gender</p>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
      </div>
    </div>

    <div class="activity-section">
      <p>Activity Level</p>
      <div class="radio-group">
        <label><input type="radio" name="activityLevel" value="low"> Low</label>
        <label><input type="radio" name="activityLevel" value="medium"> Medium</label>
        <label><input type="radio" name="activityLevel" value="high"> High</label>
      </div>
    </div>

    <div class="buttons-section">
      <button type="button" class="buttona">Calculate</button>
      <button type="button" class="report">Report Plan</button>
    </div>
  </form>
</div>
</body>
</html>
